<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Links</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <script
      src="https://kit.fontawesome.com/4a3b1f73a2.js"
      crossorigin="anonymous"
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        /* background: linear-gradient(135deg, #667eea, #764ba2); */
        background: #000000;
      }

      .container {
        /* background: #fff; */
        padding: 30px 25px;
        border-radius: 20px;
        width: 400px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .links a {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
        text-decoration: none;
        margin: 20px 0;
        padding: 12px;
        border-radius: 12px;
        color: white;
        font-weight: 500;
        transition: 0.3s;
      }
      .links a i {
        font-size: 18px;
      }
      /* Platform Colors */
      .instagram {
        background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
      }

      .whatsapp {
        background: #25d366;
      }
      .google {
        background: linear-gradient(45deg, #4285f4, #34a853, #fbbc05, #ea4335);
      }

      /* Hover Effects */
      .links a:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="links">
        <a
          href="https://www.instagram.com/bypass._.arena?igsh=MXZuOGtuaHA4djdhYw%3D%3D&utm_source=qr"
          target="_blank"
          class="instagram"
        >
          <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://wa.me/7994682762" target="_blank" class="whatsapp">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a
          href="https://share.google/DUkU5REp1ZkMeT3XR"
          target="_blank"
          class="google"
        >
          <i class="fab fa-google"></i> Google Page
        </a>
      </div>
    </div>
  </body>
</html>
